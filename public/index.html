<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0e0e0e" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="rBang" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <title>rBang</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three":                        "./three/build/three.module.js",
        "three/addons/":                "./three/examples/jsm/",
        "three/examples/jsm/":          "./three/examples/jsm/",
        "@dimforge/rapier3d-compat":    "./rapier/rapier.es.js",
        "manifold-3d":                  "./manifold/manifold.js",
        "three-gpu-pathtracer":         "./pathtracer/index.module.js",
        "three-mesh-bvh":              "./mesh-bvh/index.module.js"
      }
    }
  </script>
</head>
<body>
  <script>window.RBANG_BASE = new URL('.', document.baseURI).href;</script>
  <script src="./eruda/eruda.js" onerror="window.eruda={init:()=>{}}"></script>
  <script>eruda.init();</script>
  <script type="module" src="./src/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    // Bouton d'installation PWA
    (function () {
      let _deferredPrompt = null;
      const btn = document.createElement('button');
      btn.textContent = '⊕ Installer';
      btn.style.cssText = [
        'position:fixed', 'bottom:16px', 'left:50%', 'transform:translateX(-50%)',
        'z-index:99999', 'display:none',
        'padding:10px 24px', 'border:none', 'border-radius:24px',
        'background:#f0c040', 'color:#0e0e0e', 'font-size:15px',
        'font-weight:600', 'cursor:pointer', 'box-shadow:0 2px 12px #0008'
      ].join(';');
      document.body.appendChild(btn);

      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        _deferredPrompt = e;
        btn.style.display = 'block';
      });

      btn.addEventListener('click', async () => {
        if (!_deferredPrompt) return;
        btn.style.display = 'none';
        _deferredPrompt.prompt();
        await _deferredPrompt.userChoice;
        _deferredPrompt = null;
      });

      window.addEventListener('appinstalled', () => { btn.style.display = 'none'; });
    })();
  </script>
</body>
</html>
